name: RouterOSWiFiPatch

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '设备模式 (1:AX5, 2:AX3600)'
        required: true
        default: '2'
      mac_fragment:
        description: 'MAC 片段 (如: A1B2)'
        required: true
      versions:
        description: '版本号片段 (如: 7.15 7.12.1)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools
        pip install ecdsa pycryptodome

    - name: Run Patch
      run: |
        chmod +x wifipatch.sh
        # 传入参数：模式、MAC片段、版本号列表
        ./wifipatch.sh "${{ github.event.inputs.mode }}" "${{ github.event.inputs.mac_fragment }}" ${{ github.event.inputs.versions }}

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: Patched-NPKs-${{ github.event.inputs.mac_fragment }}
        path: "*.npk"
        if-no-files-found: error
