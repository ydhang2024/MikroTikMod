name: Build ROS Tool (1.3.2-MinGW64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Deps
      run: |
        pip install customtkinter pyinstaller

    - name: Download SquashFS Tools 1.3.2
      shell: pwsh
      run: |
        # 1. 下载工具包
        $url = "https://infraroot.at/pub/squashfs/windows/squashfs-tools-ng-1.3.2-mingw64.zip"
        Invoke-WebRequest -Uri $url -OutFile sq.zip
        
        # 2. 解压
        Expand-Archive sq.zip -DestinationPath sq_temp
        
        # 3. 递归搜索所有的 .exe 和 .dll 并拷贝到当前根目录
        # 这样无论它在 bin 还是在根目录，都能被找到
        Get-ChildItem -Path sq_temp -Filter *.exe -Recurse | Copy-Item -Destination .
        Get-ChildItem -Path sq_temp -Filter *.dll -Recurse | Copy-Item -Destination .
        
        # 4. 验证一下文件是否真的过来了
        ls rdsquashfs.exe, gensquashfs.exe

    - name: PyInstaller Build
      run: |
        pyinstaller --onefile --noconsole --collect-all customtkinter ros_art_patcher_gui.py

    - name: Create Bundle
      shell: pwsh
      run: |
        mkdir release
        cp dist/ros_art_patcher_gui.exe release/
        cp rdsquashfs.exe release/
        cp gensquashfs.exe release/
        cp *.dll release/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ROS-Patcher-1.3.2-MinGW
        path: release/
