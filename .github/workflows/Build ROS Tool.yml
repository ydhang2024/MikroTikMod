name: Build ROS Tool (1.3.2-MinGW64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Deps
      run: |
        pip install customtkinter pyinstaller

    - name: Download SquashFS Tools 1.3.2
      shell: pwsh
      run: |
        # 使用你提供的 URL
        $url = "https://infraroot.at/pub/squashfs/windows/squashfs-tools-ng-1.3.2-mingw64.zip"
        Invoke-WebRequest -Uri $url -OutFile sq.zip
        Expand-Archive sq.zip -DestinationPath sq_pkg
        
        # 复制 bin 下的所有 exe 和 dll
        cp sq_pkg/bin/*.exe .
        cp sq_pkg/bin/*.dll .

    - name: PyInstaller Build
      run: |
        pyinstaller --onefile --noconsole --collect-all customtkinter ros_art_patcher_gui.py

    - name: Create Bundle
      shell: pwsh
      run: |
        mkdir release
        cp dist/ros_art_patcher_gui.exe release/
        cp rdsquashfs.exe release/
        cp gensquashfs.exe release/
        cp *.dll release/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ROS-Patcher-1.3.2-MinGW
        path: release/
