name: MikroTik RouterOS Auto Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'RouterOS 版本 (例如: 7.16.1)'
        required: true
        type: string

# 必须赋予 GitHub Actions 写入权限才能创建 Release
permissions:
  contents: write

jobs:
  patch-and-pack:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip wget curl
          # 如果你的 python 脚本有外部依赖 (例如 pip install cryptography)，请在这里取消注释并添加：
          # pip install -r requirements.txt 

      - name: 下载、Patch、重新打包并获取更新日志
        env:
          # 从 GitHub Secrets 中读取加密的环境变量
          MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.MIKRO_NPK_SIGN_PUBLIC_KEY }}
          MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.MIKRO_LICENSE_PUBLIC_KEY }}
          CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
          CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
          CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
          CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
          
          # 变量处理
          VERSION: ${{ inputs.version }}
          ARCH: 'arm64' # 固定架构为 arm64
        run: |
          echo "==============================="
          echo " MikroTik RouterOS Patch Tool  "
          echo " RouterOS Version: $VERSION    "
          echo " Architecture    : $ARCH       "
          echo "==============================="
          
          echo "1. 下载 RouterOS NPK 和 All Packages..."
          wget -q --show-progress https://${{ secrets.MIKRO_DOWNLOAD_URL }}/${VERSION}-${ARCH}/routeros-${VERSION}-${ARCH}.npk
          wget -q --show-progress https://${{ secrets.MIKRO_DOWNLOAD_URL }}/${VERSION}-${ARCH}/all_packages-${ARCH}-${VERSION}.zip
          
          echo "2. 创建目录并解压 packages..."
          sudo mkdir -p ./all_packages-${ARCH}
          sudo unzip -q all_packages-${ARCH}-${VERSION}.zip -d ./all_packages-${ARCH}/
          
          echo "3. 执行 Patch (routeros)..."
          sudo -E python3 patch.py npk routeros-${VERSION}-${ARCH}.npk
          sudo mv routeros-${VERSION}-${ARCH}.npk routeros-${VERSION}-${ARCH}-patch.npk
          
          echo "4. 签名所有解压出来的 NPK 文件..."          
          NPK_FILES=$(find ./all_packages-${ARCH} -name "*.npk")
          for file in $NPK_FILES
          do
              echo "Signing $file"
              # 使用 python3 npk.py 直接覆盖写入
              sudo -E python3 npk.py sign "$file" "$file"
          done
          
          echo "5. 拷贝qcom包到qcom文件夹"
          sudo mkdir -p qcom 
          WIFI_FILE="./all_packages-${ARCH}/wifi-qcom-${VERSION}-${ARCH}.npk"   
          if [ -f "$WIFI_FILE" ]; then
              sudo cp "$WIFI_FILE" ./qcom/
              echo "已成功备份: $WIFI_FILE"
          else
              echo "跳过：未发现目标文件 $WIFI_FILE"
          fi
          
          echo "6. 重新打包 packages..."
          cd ./all_packages-${ARCH}
          sudo zip ../all_packages-${ARCH}-${VERSION}-patched.zip *.npk >/dev/null
          cd ..
          
          echo "7. 获取 CHANGELOG..."
          # 使用 curl 下载对应版本的日志，-L 参数用于跟随重定向
          curl -sL "https://download.mikrotik.com/routeros/${VERSION}/CHANGELOG" > changelog.txt
          
          echo "清理临时文件..."
          sudo rm -rf ./all_packages-${ARCH}
          sudo rm all_packages-${ARCH}-${VERSION}.zip

      - name: 自动发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}-arm64
          name: RouterOS v${{ inputs.version }} Patched (arm64)
          body_path: changelog.txt # 将刚刚下载的 Changelog 作为 Release 说明
          files: |
            routeros-${{ inputs.version }}-arm64-patch.npk
            all_packages-arm64-${{ inputs.version }}-patched.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
